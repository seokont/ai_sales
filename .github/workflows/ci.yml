name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build shared
        run: npm run build -w @ai-seller-widget/shared

      - name: Build backend
        run: npm run build -w backend

      - name: Run tests
        run: npm test -w backend
